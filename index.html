<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Simple Video Task</title>

  <!-- jsPsych v8 -->
  <script src="https://unpkg.com/jspsych@8.2.1"></script>
  <script src="https://unpkg.com/@jspsych/plugin-preload@2.1.0"></script>
  <script src="https://unpkg.com/@jspsych/plugin-fullscreen@2.1.0"></script>
  <script src="https://unpkg.com/@jspsych/plugin-video-keyboard-response@2.1.0"></script>
  <script src="https://unpkg.com/@jspsych-contrib/plugin-pipe"></script>


  <link href="https://unpkg.com/jspsych@8.2.1/css/jspsych.css" rel="stylesheet" type="text/css" />

  <style>
    body {
      background: #111;
      color: white;
    }

    .jspsych-content {
      max-width: 100vw;
    }

    video {
      max-width: 90vw;
      max-height: 85vh;
      background: black;
    }
  </style>
</head>

<body></body>

<script>
  /*
    Cambia questo percorso con il tuo video.
    Può essere un file locale nella cartella dell'esperimento:
    const VIDEO_FILE = "stimuli/filmato.mp4";

    Oppure un link diretto a un file .mp4:
    const VIDEO_FILE = "https://example.com/filmato.mp4";
  */
  const VIDEO_FILE = "filmato.mp4";

  const subject_id = jsPsych.randomization.randomID(10);
  const filename = `${subject_id}.json`;

  var timeline = [];

  const jsPsych = initJsPsych({
    on_finish: function() {
      jsPsych.data.displayData();
    }
  });

  const preload = {
    type: jsPsychPreload,
    video: [VIDEO_FILE],
    show_progress_bar: true,
    message: "Caricamento del video..."
  };

  const enter_fullscreen = {
    type: jsPsychFullscreen,
    fullscreen_mode: true,
    message: `
      <p>Il video verrà presentato a schermo intero.</p>
      <p>Premi il pulsante qui sotto per iniziare.</p>
    `,
    button_label: "Inizia"
  };

  const video_trial = {
    type: jsPsychVideoKeyboardResponse,
    stimulus: [VIDEO_FILE],

    /*
      Mostra i controlli nativi del browser.
      Il partecipante può premere PLAY direttamente sul video.
    */
    controls: true,

    /*
      Il video NON parte automaticamente.
    */
    autoplay: false,

    /*
      Non sono richieste risposte da tastiera.
    */
    choices: "NO_KEYS",

    /*
      Il trial termina quando il video finisce.
    */
    trial_ends_after_video: true,

    prompt: `
      <p style="color:white; font-size:20px;">
        Premi PLAY per avviare il video.
      </p>
    `,

    data: {
      task: "simple_video_viewing",
      video_file: VIDEO_FILE
    }
  };

  const exit_fullscreen = {
    type: jsPsychFullscreen,
    fullscreen_mode: false
  };

  const save_data = {
  type: jsPsychPipe,
  action: "save",
  experiment_id: "uU4CHDW9KZ8J",
  filename: filename,
  data_string: ()=>jsPsych.data.get().json()
};

  timeline.push(preload,enter_fullscreen,video_trial,exit_fullscreen,save_data);
  jsPsych.run(timeline)
</script>
</html>
