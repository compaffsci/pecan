<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Dominance Video Task</title>

  <!-- jsPsych v8 -->
  <script src="https://unpkg.com/jspsych@8.2.1"></script>
  <script src="https://unpkg.com/@jspsych/plugin-fullscreen@2.1.0"></script>
  <script src="https://unpkg.com/@jspsych/plugin-preload@2.1.0"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-button-response@2.1.0"></script>

  <!-- DataPipe plugin for OSF saving -->
  <script src="https://unpkg.com/@jspsych-contrib/plugin-pipe@0.6.0"></script>

  <link href="https://unpkg.com/jspsych@8.2.1/css/jspsych.css" rel="stylesheet" type="text/css" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
    }

    body.hide-cursor,
    body.hide-cursor * {
      cursor: none !important;
    }

    .jspsych-content-wrapper {
      width: 100vw;
      height: 100vh;
    }

    .jspsych-content {
      max-width: 100vw;
      width: 100vw;
      height: 100vh;
    }

    .message-box {
      max-width: 850px;
      margin: auto;
      font-size: 22px;
      line-height: 1.5;
      text-align: center;
      color: white;
    }

    .jspsych-btn {
      font-size: 22px;
      padding: 14px 34px;
      border-radius: 10px;
      cursor: pointer;
    }

    /*
      =========================================================
      INSTRUCTION PAGE
      =========================================================
    */

    #instruction-page {
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
      box-sizing: border-box;
      padding: 60px;
    }

    #instruction-box {
      max-width: 900px;
      text-align: left;
      font-size: 22px;
      line-height: 1.5;
    }

    #instruction-box h1 {
      font-size: 38px;
      margin-bottom: 30px;
    }

    #instruction-box ul {
      margin-top: 20px;
      margin-bottom: 30px;
    }

    #instruction-box li {
      margin-bottom: 14px;
    }

    /*
      =========================================================
      DOMINANCE VIDEO TASK
      =========================================================
    */

    #dominance-task {
      width: 100vw;
      height: 100vh;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 280px;
      gap: 30px;
      align-items: center;
      box-sizing: border-box;
      padding: 30px;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
    }

    #video-panel {
      position: relative;
      width: 100%;
      height: 88vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: black;
      border-radius: 12px;
      overflow: hidden;
    }

    #stim-video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: black;
    }

    #play-button {
      position: absolute;
      z-index: 10;
      padding: 18px 36px;
      font-size: 24px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: white;
      color: black;
      font-weight: bold;
    }

    #scale-panel {
      height: 88vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    #scale-title {
      font-size: 24px;
      margin-bottom: 24px;
      font-weight: bold;
    }

    #scale-container {
      position: relative;
      width: 120px;
      height: 68vh;
    }

    #scale-axis {
      position: absolute;
      left: 58px;
      top: 0;
      width: 4px;
      height: 100%;
      background: #777;
      border-radius: 4px;
    }

    #positive-fill,
    #negative-fill {
      position: absolute;
      left: 58px;
      width: 4px;
      border-radius: 4px;
    }

    #positive-fill {
      background: #3fa7ff;
      bottom: 50%;
      height: 0%;
    }

    #negative-fill {
      background: #ff8c42;
      top: 50%;
      height: 0%;
    }

    #zero-tick {
      position: absolute;
      left: 42px;
      top: 50%;
      width: 36px;
      height: 3px;
      background: white;
      transform: translateY(-50%);
    }

    .major-tick {
      position: absolute;
      left: 48px;
      width: 24px;
      height: 2px;
      background: white;
      transform: translateY(-50%);
    }

    #tick-plus {
      top: 0%;
    }

    #tick-minus {
      top: 100%;
    }

    .scale-label {
      position: absolute;
      left: 82px;
      transform: translateY(-50%);
      font-size: 16px;
      white-space: nowrap;
    }

    #label-plus {
      top: 0%;
    }

    #label-zero {
      top: 50%;
    }

    #label-minus {
      top: 100%;
    }

    #dominance-handle {
      position: absolute;
      left: 45px;
      top: calc(50% - 15px);
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: white;
      border: 3px solid #222;
      box-sizing: border-box;
      transition: top 80ms linear, background 80ms linear;
    }

    #current-value {
      margin-top: 26px;
      font-size: 26px;
      font-weight: bold;
    }

    #instructions {
      margin-top: 18px;
      font-size: 15px;
      line-height: 1.35;
      color: #ddd;
      text-align: center;
      max-width: 240px;
    }
  </style>
</head>

<body></body>

<script>
  /*
    =========================================================
    SETTINGS TO CHANGE
    =========================================================
  */

  /*
    This ID is provided by DataPipe after creating the experiment.
  */
  const EXPERIMENT_ID = "uU4CHDW9KZ8J";

  /*
    If the video is in your GitHub repository, use a relative path.

    Repository structure:
    index.html
    stimuli/
      filmato.mp4
  */
  const VIDEO_FILE = "stimuli/filmato.mp4";

  /*
    Set to true only while testing locally.
    In the real online experiment, keep this false.
  */
  const DEBUG_MODE = false;

  /*
    =========================================================
    INITIALIZE JSPSYCH
    =========================================================
  */

  const jsPsych = initJsPsych({
    on_finish: function() {
      document.body.classList.remove("hide-cursor");

      if (DEBUG_MODE) {
        jsPsych.data.displayData("json");
      }
    }
  });

  /*
    =========================================================
    PARTICIPANT AND FILENAME
    =========================================================
  */

  function getURLParameter(name) {
    const params = new URLSearchParams(window.location.search);
    return params.get(name);
  }

  function sanitizeForFilename(value) {
    return String(value)
      .replace(/[^a-zA-Z0-9_-]/g, "_")
      .substring(0, 80);
  }

  const participantID =
    getURLParameter("PROLIFIC_PID") ||
    getURLParameter("participant") ||
    getURLParameter("participant_id") ||
    jsPsych.randomization.randomID(12);

  const sessionID = jsPsych.randomization.randomID(12);

  const timestamp = new Date()
    .toISOString()
    .replace(/[:.]/g, "-");

  const dataFilename =
    "dominance_" +
    sanitizeForFilename(participantID) + "_" +
    sanitizeForFilename(sessionID) + "_" +
    timestamp + ".csv";

  jsPsych.data.addProperties({
    participant_id: participantID,
    session_id: sessionID,
    video_file: VIDEO_FILE,
    data_filename: dataFilename,
    experiment_url: window.location.href,
    screen_width: window.screen.width,
    screen_height: window.screen.height,
    window_width: window.innerWidth,
    window_height: window.innerHeight,
    browser_language: navigator.language,
    user_agent: navigator.userAgent
  });

  /*
    =========================================================
    CUSTOM PLUGIN: DOMINANCE VIDEO
    =========================================================
  */

  const jsPsychDominanceVideo = (function() {

    const info = {
      name: "dominance-video",
      version: "1.3.0",
      parameters: {
        stimulus: {
          type: jsPsych.ParameterType.VIDEO,
          default: undefined
        },
        initial_value: {
          type: jsPsych.ParameterType.INT,
          default: 0
        },
        step: {
          type: jsPsych.ParameterType.INT,
          default: 20
        },
        min_value: {
          type: jsPsych.ParameterType.INT,
          default: -100
        },
        max_value: {
          type: jsPsych.ParameterType.INT,
          default: 100
        },
        repeat_interval_ms: {
          type: jsPsych.ParameterType.INT,
          default: 250
        }
      }
    };

    class DominanceVideoPlugin {
      constructor(jsPsych) {
        this.jsPsych = jsPsych;
      }

      trial(display_element, trial) {
        let dominance = trial.initial_value;
        let dominanceEvents = [];
        let mediaEvents = [];

        let trialStartTime = performance.now();
        let videoStartWallTime = null;
        let lastChangeWallTime = null;
        let videoStarted = false;
        let trialEnded = false;

        let heldKey = null;
        let holdInterval = null;

        const repeatIntervalMs = trial.repeat_interval_ms;

        display_element.innerHTML = `
          <div id="dominance-task">
            <div id="video-panel">
              <video id="stim-video" preload="auto" playsinline>
                <source src="${trial.stimulus}" type="video/mp4">
                Your browser does not support the video tag.
              </video>

              <button id="play-button">PLAY</button>
            </div>

            <div id="scale-panel">
              <div id="scale-title">Dominance</div>

              <div id="scale-container">
                <div id="scale-axis"></div>

                <div id="positive-fill"></div>
                <div id="negative-fill"></div>

                <div id="zero-tick"></div>
                <div id="tick-plus" class="major-tick"></div>
                <div id="tick-minus" class="major-tick"></div>

                <div id="label-plus" class="scale-label">+100<br>In control</div>
                <div id="label-zero" class="scale-label">0</div>
                <div id="label-minus" class="scale-label">-100<br>Overwhelmed</div>

                <div id="dominance-handle"></div>
              </div>

              <div id="current-value">0</div>

              <div id="instructions">
                Arrow up: more in control<br>
                Arrow down: more overwhelmed<br><br>
                Keep a key pressed to move continuously.<br>
                ESC: interrupt the experiment.
              </div>
            </div>
          </div>
        `;

        const video = display_element.querySelector("#stim-video");
        const playButton = display_element.querySelector("#play-button");
        const handle = display_element.querySelector("#dominance-handle");
        const positiveFill = display_element.querySelector("#positive-fill");
        const negativeFill = display_element.querySelector("#negative-fill");
        const currentValue = display_element.querySelector("#current-value");

        function clamp(value, min, max) {
          return Math.min(Math.max(value, min), max);
        }

        function valueToPercentFromTop(value) {
          /*
            +100 -> 0%
               0 -> 50%
            -100 -> 100%
          */
          return ((trial.max_value - value) / (trial.max_value - trial.min_value)) * 100;
        }

        function updateScale() {
          const percent = valueToPercentFromTop(dominance);

          handle.style.top = `calc(${percent}% - 15px)`;
          currentValue.textContent = dominance > 0 ? `+${dominance}` : `${dominance}`;

          if (dominance > 0) {
            positiveFill.style.bottom = "50%";
            positiveFill.style.height = `${50 - percent}%`;
            negativeFill.style.height = "0%";
            handle.style.background = "#3fa7ff";
          } else if (dominance < 0) {
            positiveFill.style.height = "0%";
            negativeFill.style.top = "50%";
            negativeFill.style.height = `${percent - 50}%`;
            handle.style.background = "#ff8c42";
          } else {
            positiveFill.style.height = "0%";
            negativeFill.style.height = "0%";
            handle.style.background = "white";
          }
        }

        function nowFromTrialStart() {
          return performance.now() - trialStartTime;
        }

        function nowFromVideoStart() {
          if (videoStartWallTime === null) {
            return null;
          }

          return performance.now() - videoStartWallTime;
        }

        function logMediaEvent(eventType) {
          mediaEvents.push({
            event_type: eventType,
            video_time_sec: Number(video.currentTime.toFixed(4)),
            time_since_trial_start_ms: Math.round(nowFromTrialStart()),
            time_since_video_start_ms: nowFromVideoStart() === null ? null : Math.round(nowFromVideoStart())
          });
        }

        function logDominanceChange(key, oldValue, newValue) {
          const now = performance.now();

          dominanceEvents.push({
            event_type: "dominance_change",
            key: key,
            old_value: oldValue,
            value: newValue,
            video_time_sec: Number(video.currentTime.toFixed(4)),
            time_since_trial_start_ms: Math.round(now - trialStartTime),
            time_since_video_start_ms: videoStartWallTime === null ? null : Math.round(now - videoStartWallTime),
            time_since_last_change_ms: lastChangeWallTime === null ? null : Math.round(now - lastChangeWallTime)
          });

          lastChangeWallTime = now;
        }

        function canRespond() {
          return videoStarted && !video.paused && !video.ended && !trialEnded;
        }

        function applyDominanceStep(key) {
          if (!canRespond()) {
            return;
          }

          const oldValue = dominance;

          if (key === "ArrowUp") {
            dominance = clamp(dominance + trial.step, trial.min_value, trial.max_value);
          }

          if (key === "ArrowDown") {
            dominance = clamp(dominance - trial.step, trial.min_value, trial.max_value);
          }

          if (dominance !== oldValue) {
            updateScale();
            logDominanceChange(key, oldValue, dominance);
          }
        }

        function stopHeldKey() {
          heldKey = null;

          if (holdInterval !== null) {
            clearInterval(holdInterval);
            holdInterval = null;
          }
        }

        function startHeldKey(key) {
          if (!canRespond()) {
            return;
          }

          if (heldKey === key && holdInterval !== null) {
            return;
          }

          stopHeldKey();

          heldKey = key;

          /*
            First change immediately.
          */
          applyDominanceStep(key);

          /*
            Then continue while the key is held.
          */
          holdInterval = setInterval(() => {
            applyDominanceStep(key);
          }, repeatIntervalMs);
        }

        function buildTrialData(reason, interrupted, interruptionSource) {
          return {
            task: "dominance_video_rating",
            stimulus: trial.stimulus,
            final_dominance: dominance,
            dominance_events_json: JSON.stringify(dominanceEvents),
            media_events_json: JSON.stringify(mediaEvents),
            video_duration: Number.isFinite(video.duration) ? video.duration : null,
            n_dominance_changes: dominanceEvents.filter(e => e.event_type === "dominance_change").length,
            trial_end_reason: reason,
            interrupted: interrupted,
            interruption_source: interruptionSource,
            repeat_interval_ms: repeatIntervalMs
          };
        }

        function cleanup() {
          stopHeldKey();

          document.body.classList.remove("hide-cursor");

          window.removeEventListener("keydown", onKeyDown, true);
          window.removeEventListener("keyup", onKeyUp, true);
          document.removeEventListener("fullscreenchange", onFullscreenChange);
        }

        function endTrial(reason = "video_ended", interrupted = false, interruptionSource = null) {
          if (trialEnded) {
            return;
          }

          trialEnded = true;

          cleanup();

          const trialData = buildTrialData(reason, interrupted, interruptionSource);

          display_element.innerHTML = "";

          this.jsPsych.finishTrial(trialData);
        }

        endTrial = endTrial.bind(this);

        function interruptTrial(source = "escape_key") {
          if (trialEnded) {
            return;
          }

          try {
            video.pause();
          } catch (err) {}

          const now = performance.now();

          dominanceEvents.push({
            event_type: "experiment_interrupted",
            source: source,
            value: dominance,
            video_time_sec: Number(video.currentTime.toFixed(4)),
            time_since_trial_start_ms: Math.round(now - trialStartTime),
            time_since_video_start_ms: videoStartWallTime === null ? null : Math.round(now - videoStartWallTime),
            time_since_last_change_ms: lastChangeWallTime === null ? null : Math.round(now - lastChangeWallTime)
          });

          /*
            Important:
            We finish the trial instead of fully aborting jsPsych,
            so the next DataPipe trial can still save the data to OSF.
          */
          endTrial("interrupted", true, source);
        }

        function onKeyDown(e) {
          if (trialEnded) {
            return;
          }

          if (e.key === "Escape") {
            e.preventDefault();
            interruptTrial("escape_key");
            return;
          }

          if (e.key !== "ArrowUp" && e.key !== "ArrowDown") {
            return;
          }

          e.preventDefault();

          startHeldKey(e.key);
        }

        function onKeyUp(e) {
          if (e.key === heldKey) {
            stopHeldKey();
          }
        }

        function onFullscreenChange() {
          /*
            In many browsers, ESC first exits fullscreen.
            If the participant exits fullscreen after the video has started,
            we interrupt the trial and continue to data saving.
          */
          if (!trialEnded && videoStarted && !document.fullscreenElement) {
            interruptTrial("fullscreen_exit");
          }
        }

        updateScale();

        window.addEventListener("keydown", onKeyDown, true);
        window.addEventListener("keyup", onKeyUp, true);
        document.addEventListener("fullscreenchange", onFullscreenChange);

        video.addEventListener("waiting", () => {
          logMediaEvent("video_waiting");
        });

        video.addEventListener("stalled", () => {
          logMediaEvent("video_stalled");
        });

        video.addEventListener("playing", () => {
          logMediaEvent("video_playing");
        });

        video.addEventListener("pause", () => {
          if (!video.ended && !trialEnded) {
            logMediaEvent("video_pause");
          }
        });

        video.addEventListener("ended", () => {
          logMediaEvent("video_ended");
          endTrial("video_ended", false, null);
        });

        playButton.addEventListener("click", async () => {
          playButton.disabled = true;

          try {
            await video.play();

            videoStarted = true;
            videoStartWallTime = performance.now();
            lastChangeWallTime = videoStartWallTime;

            playButton.style.display = "none";

            /*
              Hide the mouse cursor only after the movie has actually started.
            */
            document.body.classList.add("hide-cursor");

            dominanceEvents.push({
              event_type: "video_start",
              value: dominance,
              video_time_sec: Number(video.currentTime.toFixed(4)),
              time_since_trial_start_ms: Math.round(videoStartWallTime - trialStartTime),
              time_since_video_start_ms: 0,
              time_since_last_change_ms: null
            });

          } catch (err) {
            playButton.disabled = false;
            playButton.textContent = "CLICK TO PLAY";
            document.body.classList.remove("hide-cursor");
            console.error("Video playback failed:", err);
          }
        });
      }
    }

    DominanceVideoPlugin.info = info;

    return DominanceVideoPlugin;
  })();

  /*
    =========================================================
    TIMELINE
    =========================================================
  */

  const preload = {
    type: jsPsychPreload,
    video: [VIDEO_FILE],
    show_progress_bar: true,
    message: "Loading movie..."
  };

  const enter_fullscreen = {
    type: jsPsychFullscreen,
    fullscreen_mode: true,
    message: `
      <div class="message-box">
        <p>The task will start in fullscreen mode.</p>
        <p>Please keep the browser in fullscreen mode until the task is completed.</p>
      </div>
    `,
    button_label: "Start"
  };

  const instructions_page = {
    type: jsPsychHtmlButtonResponse,
    stimulus: `
      <div id="instruction-page">
        <div id="instruction-box">
          <h1>Instructions</h1>

          <p>
            In this task, you will watch a short movie and continuously rate your
            momentary feeling of <strong>dominance</strong>.
          </p>

          <p>
            Dominance refers to the extent to which you feel in control or,
            conversely, overwhelmed during the movie.
          </p>

          <ul>
            <li>
              Use the <strong>up arrow</strong> to increase the dominance rating
              when you feel more in control.
            </li>

            <li>
              Use the <strong>down arrow</strong> to decrease the dominance rating
              when you feel more overwhelmed.
            </li>

            <li>
              You can press the keys repeatedly or keep a key pressed to move the
              rating continuously.
            </li>

            <li>
              The scale ranges from <strong>+100</strong> to <strong>-100</strong>.
            </li>

            <li>
              At the beginning, the rating is set to <strong>0</strong>.
            </li>
          </ul>

          <p>
            On the next screen, the movie will initially be paused.
            Press <strong>PLAY</strong> to start the movie and begin the rating.
          </p>

          <p>
            Press <strong>ESC</strong> if you need to interrupt the experiment.
            If this happens, the data collected up to that point will still be saved.
          </p>
        </div>
      </div>
    `,
    choices: ["Continue"]
  };

  const dominance_trial = {
    type: jsPsychDominanceVideo,
    stimulus: VIDEO_FILE,
    initial_value: 0,
    step: 20,
    min_value: -100,
    max_value: 100,

    /*
      How often the value changes when the participant keeps
      the up/down arrow pressed.

      250 ms = reasonably controllable.
      150 ms = faster.
      300/400 ms = slower.
    */
    repeat_interval_ms: 250
  };

  /*
    This trial sends the complete jsPsych data to OSF through DataPipe.
    The data are saved as a CSV file.
  */
  const save_data = {
    type: jsPsychPipe,
    action: "save",
    experiment_id: EXPERIMENT_ID,
    filename: dataFilename,
    data_string: function() {
      return jsPsych.data.get().csv();
    },
    wait_message: `
      <div class="message-box">
        <p>Saving data.</p>
        <p>Please do not close this page.</p>
      </div>
    `,
    compression: true
  };

  const final_message = {
    type: jsPsychHtmlButtonResponse,
    stimulus: function() {
      const pipeTrial = jsPsych.data
        .get()
        .filter({ trial_type: "pipe" })
        .last(1)
        .values()[0];

      if (pipeTrial && pipeTrial.success === true) {
        return `
          <div class="message-box">
            <h2>Thank you!</h2>
            <p>The task is complete and the data have been saved successfully.</p>
            <p>You can now close this window.</p>
          </div>
        `;
      } else {
        return `
          <div class="message-box">
            <h2>Warning</h2>
            <p>The task is complete, but there may have been a problem saving the data.</p>
            <p>Please contact the experimenter before closing this window.</p>
          </div>
        `;
      }
    },
    choices: ["Finish"]
  };

  const exit_fullscreen = {
    type: jsPsychFullscreen,
    fullscreen_mode: false,
    delay_after: 0
  };

  jsPsych.run([
    preload,
    enter_fullscreen,
    instructions_page,
    dominance_trial,
    save_data,
    final_message,
    exit_fullscreen
  ]);
</script>
</html>
