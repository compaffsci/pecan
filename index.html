<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Simple Video Task</title>

  <!-- jsPsych v8 -->
  <script src="https://unpkg.com/jspsych@8.2.1"></script>
  <script src="https://unpkg.com/@jspsych/plugin-preload@2.1.0"></script>
  <script src="https://unpkg.com/@jspsych/plugin-fullscreen@2.1.0"></script>
  <script src="https://unpkg.com/@jspsych/plugin-video-keyboard-response@2.1.0"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-button-response@2.1.0"></script>

  <!-- DataPipe plugin for OSF saving -->
  <script src="https://unpkg.com/@jspsych-contrib/plugin-pipe@0.6.0"></script>

  <link href="https://unpkg.com/jspsych@8.2.1/css/jspsych.css" rel="stylesheet" type="text/css" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #111;
      color: white;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    .jspsych-content {
      max-width: 100vw;
    }

    video {
      max-width: 90vw;
      max-height: 85vh;
      background: black;
    }

    .message-box {
      max-width: 800px;
      margin: auto;
      font-size: 22px;
      line-height: 1.5;
      text-align: center;
      color: white;
    }

    .jspsych-btn {
      font-size: 20px;
      padding: 12px 28px;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>

<body></body>

<script>
  /*
    =========================================================
    SETTINGS TO CHANGE
    =========================================================
  */

  /*
    This ID is provided by DataPipe after you create your experiment
    at https://pipe.jspsych.org/
  */
  const EXPERIMENT_ID = "uU4CHDW9KZ8J";

  /*
    If the video is inside your GitHub repository, use a relative path:
    const VIDEO_FILE = "stimuli/filmato.mp4";

    Repository structure:
    index.html
    stimuli/
      filmato.mp4

    You can also use a direct external .mp4 URL, but it must point
    directly to the video file, not to a preview page.
  */
  const VIDEO_FILE = "stimuli/filmato.mp4";

  /*
    Set to true only while testing locally.
    In the real online experiment, keep this false so participants
    do not see the raw data.
  */
  const DEBUG_MODE = false;

  /*
    =========================================================
    INITIALIZE JSPSYCH
    =========================================================
  */

  const jsPsych = initJsPsych({
    on_finish: function() {
      if (DEBUG_MODE) {
        jsPsych.data.displayData("json");
      }
    }
  });

  /*
    =========================================================
    PARTICIPANT AND FILE NAMING
    =========================================================
  */

  function getURLParameter(name) {
    const params = new URLSearchParams(window.location.search);
    return params.get(name);
  }

  function sanitizeForFilename(value) {
    return String(value)
      .replace(/[^a-zA-Z0-9_-]/g, "_")
      .substring(0, 80);
  }

  /*
    The script first checks whether the participant ID is passed in the URL.
    This is useful for Prolific, SONA, Qualtrics, etc.

    Example URL:
    https://yourusername.github.io/yourrepo/?participant=Luca001

    For Prolific:
    https://yourusername.github.io/yourrepo/?PROLIFIC_PID=xxxxx
  */
  const participantID =
    getURLParameter("PROLIFIC_PID") ||
    getURLParameter("participant") ||
    getURLParameter("participant_id") ||
    jsPsych.randomization.randomID(12);

  const sessionID = jsPsych.randomization.randomID(12);

  const timestamp = new Date()
    .toISOString()
    .replace(/[:.]/g, "-");

  const dataFilename =
    sanitizeForFilename(participantID) + "_" +
    sanitizeForFilename(sessionID) + "_" +
    timestamp + ".csv";

  jsPsych.data.addProperties({
    participant_id: participantID,
    session_id: sessionID,
    video_file: VIDEO_FILE,
    data_filename: dataFilename,
    experiment_url: window.location.href,
    screen_width: window.screen.width,
    screen_height: window.screen.height,
    window_width: window.innerWidth,
    window_height: window.innerHeight,
    browser_language: navigator.language
  });

  /*
    =========================================================
    TIMELINE
    =========================================================
  */

  const preload = {
    type: jsPsychPreload,
    video: [VIDEO_FILE],
    show_progress_bar: true,
    message: "Caricamento del video..."
  };

  const enter_fullscreen = {
    type: jsPsychFullscreen,
    fullscreen_mode: true,
    message: `
      <div class="message-box">
        <p>Il video verrà presentato a schermo intero.</p>
        <p>Premi il pulsante qui sotto per iniziare.</p>
      </div>
    `,
    button_label: "Inizia"
  };

  const video_trial = {
    type: jsPsychVideoKeyboardResponse,
    stimulus: [VIDEO_FILE],

    /*
      The participant manually presses PLAY using the native video controls.
    */
    controls: true,
    autoplay: false,

    /*
      No keyboard response is required.
    */
    choices: "NO_KEYS",

    /*
      The trial ends automatically when the video ends.
    */
    trial_ends_after_video: true,

    prompt: `
      <p style="color:white; font-size:20px;">
        Premi PLAY per avviare il video.
      </p>
    `,

    data: {
      task: "simple_video_viewing",
      video_file: VIDEO_FILE
    }
  };

  /*
    This trial sends the complete jsPsych data to OSF through DataPipe.
    The data are saved as a CSV file.
  */
  const save_data = {
    type: jsPsychPipe,
    action: "save",
    experiment_id: EXPERIMENT_ID,
    filename: dataFilename,
    data_string: function() {
      return jsPsych.data.get().csv();
    },
    wait_message: `
      <div class="message-box">
        <p>Salvataggio dei dati in corso.</p>
        <p>Per favore, non chiudere questa pagina.</p>
      </div>
    `,
    compression: true
  };

  const final_message = {
    type: jsPsychHtmlButtonResponse,
    stimulus: function() {
      const pipeTrial = jsPsych.data
        .get()
        .filter({ trial_type: "pipe" })
        .last(1)
        .values()[0];

      if (pipeTrial && pipeTrial.success === true) {
        return `
          <div class="message-box">
            <h2>Grazie!</h2>
            <p>Il task è terminato e i dati sono stati salvati correttamente.</p>
            <p>Puoi chiudere questa finestra.</p>
          </div>
        `;
      } else {
        return `
          <div class="message-box">
            <h2>Attenzione</h2>
            <p>Il task è terminato, ma potrebbe esserci stato un problema nel salvataggio dei dati.</p>
            <p>Per favore, avvisa lo sperimentatore prima di chiudere questa finestra.</p>
          </div>
        `;
      }
    },
    choices: ["Fine"]
  };

  const exit_fullscreen = {
    type: jsPsychFullscreen,
    fullscreen_mode: false,
    delay_after: 0
  };

  jsPsych.run([
    preload,
    enter_fullscreen,
    video_trial,
    save_data,
    final_message,
    exit_fullscreen
  ]);
</script>
</html>
